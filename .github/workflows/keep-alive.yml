name: Keep Services Alive

on:
  schedule:
    - cron: '*/14 * * * *'  # every 14 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake all services via gateway
        run: |
          echo "Pinging /wake endpoint..."
          curl -s --max-time 30 "https://tomato-api-gateway.onrender.com/wake" | \
            python3 -c "import sys,json; data=json.load(sys.stdin); [print(f\"{s['status']:8} {s['name']}\") for s in data['services']]"
