name: Tomato Platform CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - restaurant-service
          - catalog-service
          - cart-service
          - order-service
          - payment-service
          - delivery-service
          - review-service
          - analytics-service

    services:
      mongo:
        image: mongo:7
        ports: ["27017:27017"]
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm install

      - name: Run linter
        working-directory: services/${{ matrix.service }}
        run: npm run lint --if-present

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: npm test --if-present
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/tomato_test
          REDIS_URL: redis://localhost:6379
          RABBITMQ_URL: amqp://localhost:5672
          JWT_ACCESS_SECRET: test_secret_key_32_chars_minimum!!
          JWT_REFRESH_SECRET: test_refresh_key_32_chars_minimum!
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tomato_test
