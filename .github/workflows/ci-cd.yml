name: Tomato Platform CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/tomato

jobs:
  # ── LINT & TEST ─────────────────────────────────────────────
  test:
    name: Test Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - restaurant-service
          - catalog-service
          - cart-service
          - order-service
          - payment-service
          - delivery-service
          - review-service
          - analytics-service

    services:
      mongo:
        image: mongo:7
        ports: ["27017:27017"]
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm ci

      - name: Run linter
        working-directory: services/${{ matrix.service }}
        run: npm run lint --if-present

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: npm test --if-present
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/tomato_test
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: test_secret_key_32_chars_minimum
          JWT_REFRESH_SECRET: test_refresh_key_32_chars_minimum

  # ── BUILD & PUSH DOCKER IMAGES ──────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - restaurant-service
          - catalog-service
          - cart-service
          - order-service
          - payment-service
          - delivery-service
          - notification-service
          - review-service
          - analytics-service
          - ai-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ── BUILD FRONTEND APPS ─────────────────────────────────────
  build-frontend:
    name: Build Frontend Apps
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        app: [customer-app, admin-panel, delivery-app]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: apps/${{ matrix.app }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.app }}:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── DEPLOY TO STAGING ───────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, build-frontend]
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}

      - name: Deploy to staging namespace
        run: |
          kubectl apply -f infrastructure/kubernetes/manifests/namespace.yaml
          kubectl apply -f infrastructure/kubernetes/manifests/
          kubectl rollout restart deployment -n tomato-staging
          kubectl rollout status deployment/api-gateway -n tomato-staging --timeout=300s

  # ── DEPLOY TO PRODUCTION ────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, build-frontend]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_PROD }}

      - name: Update image tags
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          for service in api-gateway auth-service user-service restaurant-service catalog-service cart-service order-service payment-service delivery-service notification-service review-service analytics-service; do
            kubectl set image deployment/$service $service=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-$service:main-$SHORT_SHA -n tomato
          done

      - name: Wait for rollout
        run: |
          for service in api-gateway auth-service order-service; do
            kubectl rollout status deployment/$service -n tomato --timeout=300s
          done

      - name: Run smoke tests
        run: |
          sleep 30
          curl -f https://api.tomato.com/health || exit 1
          echo "✅ Production deployment successful!"

      - name: Notify on success
        if: success()
        run: echo "🚀 Deployed to production successfully!"

      - name: Rollback on failure
        if: failure()
        run: |
          kubectl rollout undo deployment/api-gateway -n tomato
          echo "⚠️ Deployment failed, rolled back!"
