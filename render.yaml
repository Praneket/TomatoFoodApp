      - key: MONGO_URI
        sync: false
      - key: RABBITMQ_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false

  # ── ANALYTICS SERVICE ────────────────────────────────────────
  - type: web
    name: tomato-analytics-service
    runtime: node
    rootDir: services/analytics-service
    buildCommand: npm install
    startCommand: npm start
