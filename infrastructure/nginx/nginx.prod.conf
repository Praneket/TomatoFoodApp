events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

  # Customer App
  server {
    listen 80;
    server_name tomato.yourdomain.com;
    return 301 https://$host$request_uri;
  }
  server {
    listen 443 ssl;
    server_name tomato.yourdomain.com;
    ssl_certificate     /etc/letsencrypt/live/tomato.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tomato.yourdomain.com/privkey.pem;
    location / {
      proxy_pass http://customer-app:80;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }

  # Admin Panel
  server {
    listen 80;
    server_name admin.yourdomain.com;
    return 301 https://$host$request_uri;
  }
  server {
    listen 443 ssl;
    server_name admin.yourdomain.com;
    ssl_certificate     /etc/letsencrypt/live/admin.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.yourdomain.com/privkey.pem;
    location / {
      proxy_pass http://admin-panel:80;
      proxy_set_header Host $host;
    }
  }

  # API Gateway
  server {
    listen 80;
    server_name api.yourdomain.com;
    return 301 https://$host$request_uri;
  }
  server {
    listen 443 ssl;
    server_name api.yourdomain.com;
    ssl_certificate     /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
    location / {
      limit_req zone=api burst=50 nodelay;
      proxy_pass http://api-gateway:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # WebSocket support for Socket.IO
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
