---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tomato-ingress
  namespace: tomato
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://tomato.com,https://admin.tomato.com"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - api.tomato.com
        - tomato.com
        - www.tomato.com
        - admin.tomato.com
      secretName: tomato-tls
  rules:
    - host: api.tomato.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
    - host: tomato.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: customer-app
                port:
                  number: 80
    - host: www.tomato.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: customer-app
                port:
                  number: 80
    - host: admin.tomato.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-panel
                port:
                  number: 80

---
# ClusterIssuer for Let's Encrypt
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@tomato.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            class: nginx
